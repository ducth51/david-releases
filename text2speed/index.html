<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Chuyển văn bản thành giọng nói chạy hoàn toàn trong trình duyệt của bạn." />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗣️</text></svg>" />
    <title>NGHI-TTS</title>
    <script>
      // Áp dụng theme trước khi Vue mount để tránh nháy màn hình
      (function () {
        const saved = localStorage.getItem('nghitts-theme')
        const dark = saved ? saved === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches
        document.documentElement.classList.toggle('dark', dark)
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
